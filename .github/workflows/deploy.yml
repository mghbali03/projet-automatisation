name: CI/CD - Formation App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configurer Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Construire l'image Docker
      - name: Build Docker image
        run: |
          docker build -t formation-app:latest .
          echo "✅ Image construite avec succès"

      # 4. Test basique (vérifier que le conteneur démarre)
      # - name: Test - Start container
      #   run: |
      #     docker run -d -p 3000:3000 --name test-container formation-app:latest
      #     sleep 5
      #     curl -f http://localhost:3000 || exit 1
      #     echo "✅ Application accessible sur port 3000"

      # - name: Run with docker-compose
      #   run: |
      #     docker compose up -d
      #     until curl -s http://localhost:3000; do
      #       echo "Waiting for app..."
      #       sleep 2
      #     done

      #     echo "App is running!"

      - name: Run with docker-compose
        run: |
          docker compose up -d
          sleep 10
          curl -f http://localhost:3000

      # 5. Nettoyage
      # - name: Cleanup
      #   run: |
      #     docker stop test-container
      #     docker rm test-container

      - name: Cleanup
        run: |
          docker compose down

