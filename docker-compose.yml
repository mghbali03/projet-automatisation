services:
  web:
    build: .
    image: formation-app
    container_name: formation-web
    ports:
      - "3002:3002"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/courseplatform
      - FLASK_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"