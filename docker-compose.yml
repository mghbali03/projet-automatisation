version: "3.8"

services:
  web:
    build: .
    image: formation-app
    container_name: formation-web
    ports:
      - "3002:3002"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3